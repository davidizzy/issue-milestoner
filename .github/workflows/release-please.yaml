name: Release Please
on:
  push:
    branches:
      - main
permissions:
  contents: write
  pull-requests: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # ratchet:googleapis/release-please-action@v4.4.1
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
      # Validate the action when a release is created
      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - name: Validate shell scripts
        if: ${{ steps.release.outputs.release_created }}
        run: |
          # Check shell script syntax
          bash -n assign-milestone.sh
          bash -n test-local.sh
          bash -n tests/test-composite.sh
      - name: Run tests
        if: ${{ steps.release.outputs.release_created }}
        run: ./tests/test-composite.sh
